# workspaces

workspace = 4, on-created-empty:$terminal --cwd ~/dotfiles
workspace = 5, on-created-empty:obsidian
workspace = 7, on-created-empty:gtk-launch ytmusic
workspace = 9, on-created-empty:$terminal yazi
workspace = 8, on-created-empty:gtk-launch teams-for-linux
workspace = 12, on-created-empty:steam-native -console

workspace = special:term, on-created-empty:[float] $terminal --class quake --cwd /tmp/ciea
workspace = special:math, on-created-empty:[float] qalculate-qt
workspace = special:pasta, on-created-empty:[float] ringboard-egui
workspace = special:scratch, on-created-empty:[float] heynote

windowrule {
	name = ws-zoom
	workspace = 8
	match:class = Zoom
}

windowrule {
	name = ws-slack
	workspace = 10
	match:class = Slack
}

# generic

windowrule {
	name = generic-float-title
	float = on
	match:title = ^(.*_float_.*)$
}

windowrule {
	name = generic-float-class
	float = on
	match:class = ^(.*_float_.*)$
}

# apps

windowrule {
	name = ringboard
	float = on
	match:class = ringboard-egui
}

windowrule {
	name = zoom
	float = on
	match:class = ^(Zoom.*)$
	match:title = ^(zoom|menu window)$
}

windowrule {
	name = godot
	float = on
	match:class = ^(org\.godotengine\.Editor)$
	match:initial_title = negative:^(Godot)$
}

# windowrule {
# 	name = godot-test
# 	float = on
# 	match:class = Godot
# }

windowrule {
	name = volume
	float = on
	pin = on
	match:class = org.pulseaudio.pavucontrol
	match:title = ^Volume Control$
}

windowrule {
	name = quake
	float = on
	opacity = 0.75 override 0.75 override
	animation = slidefade
	move = (70) (37)
	size = 1280 800
	match:class = ^(quake)$
}
